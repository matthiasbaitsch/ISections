name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"

      - name: Pack
        run: |
          VERSION=${{ github.event.release.tag_name }}
          dotnet pack ISections/ISections.csproj -c Release -p:Version=${VERSION#v} -o ./nupkg

      - name: Push to NuGet
        run: dotnet nuget push -s ./ISections/nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
